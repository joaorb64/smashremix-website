site_name: Smash Remix
site_url: https://smashremix.net/
site_description: Smash Remix is a free, fan-made mod which expands Smash 64 with new characters, stages, music and features, all while staying faithful to the original game.

theme:
  custom_dir: overrides
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  logo: "assets/smashremixlogo_icon.webp"
  favicon: assets/smashremixlogo_icon.webp
  features:
    - search.suggest
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - toc.follow
    # - toc.integrate
    - navigation.top

plugins:
  - search
  - git-committers:
      enabled: false
      repository: joaorb64/smashremix-website
      branch: main
  - macros
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - social:
      cards_layout: remix
      cards_layout_options:
        background_color: "#121212FF"
        background_image: "docs/assets/remixcast.webp"
        background_image_tint: "#101010C0"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - styles/modal.css
  - styles/extra.css
  - styles/topbar.css
  - styles/sidebar.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://joaorb64.github.io/smashremix-website/
  social_image: assets/smashremixlogo_icon.webp

nav:
  - Home:
      - index.md
  - Patcher:
      - patcher/index.md
  - Netplay Setup:
      - netplay/index.md
